name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" || (echo "Missing NEXT_PUBLIC_SUPABASE_URL" && exit 1)
          test -n "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" || (echo "Missing NEXT_PUBLIC_SUPABASE_ANON_KEY" && exit 1)
          test -n "${{ secrets.E2E_ADMIN_EMAIL }}" || (echo "Missing E2E_ADMIN_EMAIL" && exit 1)
          test -n "${{ secrets.E2E_ADMIN_PASSWORD }}" || (echo "Missing E2E_ADMIN_PASSWORD" && exit 1)
          test -n "${{ secrets.E2E_DEMO_EMAIL }}" || (echo "Missing E2E_DEMO_EMAIL" && exit 1)
          test -n "${{ secrets.E2E_DEMO_PASSWORD }}" || (echo "Missing E2E_DEMO_PASSWORD" && exit 1)
          test -n "${{ secrets.E2E_RESTRICTED_EMAIL }}" || (echo "Missing E2E_RESTRICTED_EMAIL" && exit 1)
          test -n "${{ secrets.E2E_RESTRICTED_PASSWORD }}" || (echo "Missing E2E_RESTRICTED_PASSWORD" && exit 1)

      - name: Create test env file
        run: |
          cat > .env.local <<'EOF'
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          EOF

      - name: Run smoke e2e
        env:
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_DEMO_EMAIL: ${{ secrets.E2E_DEMO_EMAIL }}
          E2E_DEMO_PASSWORD: ${{ secrets.E2E_DEMO_PASSWORD }}
          E2E_RESTRICTED_EMAIL: ${{ secrets.E2E_RESTRICTED_EMAIL }}
          E2E_RESTRICTED_PASSWORD: ${{ secrets.E2E_RESTRICTED_PASSWORD }}
        run: npm run test:e2e
